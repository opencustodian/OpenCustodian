name: Feature request
description: Propose an improvement or new schema format
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement to OpenCustodian.

  - type: input
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: Need a standardized field for chain finality metadata
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your proposal in detail
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternatives you've considered

  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility impact
      description: Does this introduce breaking changes for existing formats?
      placeholder: Backward compatible / Breaking change because ...
    validations:
      required: true

  - type: textarea
    id: examples
    attributes:
      label: Example schema or payload
      description: Provide JSON examples if possible
      render: json

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I checked existing issues/discussions for duplicates
          required: true
        - label: I explained why this improves interoperability or auditability
          required: true
